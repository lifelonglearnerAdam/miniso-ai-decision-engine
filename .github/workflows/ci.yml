name: quality-gate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -r requirements-dev.txt
      - name: Static checks
        run: |
          python -m compileall -q src scripts tests
          ruff check src scripts tests
      - name: Tests
        run: pytest -q
      - name: Reproducible smoke experiment
        run: python scripts/run_backtest.py --n-products 1200 --output-dir /tmp/miniso-demo
